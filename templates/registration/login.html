<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Vault ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #1a1f2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .login-card { max-width: 380px; width: 100%; border-radius: .75rem; }
  </style>
</head>
<body>
  <div class="card login-card p-4 shadow">
    <h1 class="h4 mb-3 text-center">
      <i class="bi bi-box-seam me-2"></i>Vault ERP
    </h1>

    {% if form.errors %}
      <div class="alert alert-danger py-2">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
        <input type="text" name="username" class="form-control" id="{{ form.username.id_for_label }}" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
        <input type="password" name="password" class="form-control" id="{{ form.password.id_for_label }}" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-dark w-100">Sign in</button>
    </form>
  </div>
</body>
</html>
